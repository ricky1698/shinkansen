<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: wiki-sup-reference-atomic</title>
</head>
<body>
  <!--
    對應 isAtomicPreserve 規則:Wikipedia <sup class="reference"><a>[N]</a></sup>
    腳註必須整段 deep clone,內部 [N] 文字完全不送 LLM,連結也保留。

    結構特徵:
      <p>...文字 1...<sup class="reference"><a>[1]</a></sup>...文字 2...
         <sup class="reference"><a>[2]</a></sup></p>
    sup.reference 命中 isAtomicPreserve → 序列化時用自閉合佔位符 ⟦*N⟧,
    內部 [1]/[2] 文字完全不出現在送 LLM 的 text 裡。

    為什麼 atomic:
      - [N] 是引用編號,翻譯沒意義
      - LLM 容易把 [1] 誤翻成「[1]」(全形括號) 或「【1】」造成連結文字錯亂
      - 整段 deep clone 是最簡單可靠的做法

    Fixture 用兩個 sup.reference 是為了驗證多個 atomic slot 的索引也對齊。
  -->
  <p id="target" style="font-family:Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#222">Edo was the former capital of feudal Japan.<sup class="reference"><a href="https://example.com/cite-1">[1]</a></sup> It was officially renamed to Tokyo in 1868 during the Meiji Restoration.<sup class="reference"><a href="https://example.com/cite-2">[2]</a></sup></p>
</body>
</html>
