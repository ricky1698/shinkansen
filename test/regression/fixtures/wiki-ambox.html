    結構特徵 (這才是要鎖死的通則,不是 .ambox class 名):

        ⟦0⟧外文⟦1⟧中文⟦2⟧最內⟦/2⟧文⟦/1⟧文⟦/0⟧
      反序列化必須遞迴重建 fragment,把每一層 element 殼 clone 回去,
      譯文就位、層次正確。

    v0.51–v0.53 的錯誤 (留作前車之鑑):
      - v0.51:在 serialize normalize 加 edge case
      - v0.52:在 plainTextFallback 加 slot dedup edge case
      兩條都是針對 Wikipedia ambox 的特判,沒有回頭審視 inject 通用路徑。
    v0.54 的真正通則:
      replaceNodeInPlace 的 fragment 由 slots 重建,正常情況整段覆蓋
      (不再用任何 site / class 特判)。

    斷言對象:
      - 注入後 DOM 結構對應 slot 巢狀 (B 包 SMALL 包 A)
      - 三層元素殼都還在 (沒被 clean slate 掉、沒層次互換)
      - 譯文文字正確就位、沒有錯層
