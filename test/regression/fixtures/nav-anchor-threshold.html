<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: nav-anchor-threshold</title>
</head>
<body>
  <!--
    對應 v1.0.16 修的「anchor 偵測門檻過低導致主選單部分翻譯」。

    結構特徵 (通則,不綁 Engadget):
      <nav> 內的獨立 <a> 元素（無 <li> 包裹、無 block 祖先）走 anchor 偵測路徑。
      v1.0.15 移除 NAV 硬排除後,這些 <a> 進入 collectParagraphs,
      若文字長度 >= 舊門檻 12 就會被收為翻譯單位。
      v1.0.16 將門檻提高到 20 字元,確保導覽列 label 不被翻譯。

    斷言:
      - nav 內所有獨立 <a>（無論長短）都不出現在 units 裡
      - <li> 內的 <a>（走 walker 路徑而非 anchor 路徑）仍被偵測
      - 正常 article 段落仍被偵測
  -->

  <!-- 控制組: 正常 article 段落,應被偵測 -->
  <article>
    <p id="control-article">This is a normal article paragraph that should still be detected and translated as usual when the page also contains navigation links.</p>
  </article>

  <!-- 測試目標 A: 主選單獨立 <a>,無 <li> 包裹,走 anchor 偵測路徑 -->
  <!-- 這些全部都不應被偵測,無論文字長短 -->
  <nav id="main-nav">
    <a id="nav-short" href="/news"><span>News</span></a>
    <a id="nav-medium" href="/reviews"><span>Reviews</span></a>
    <a id="nav-long-13" href="/buyers-guide"><span>Buyer's Guide</span></a>
    <a id="nav-long-15" href="/entertainment"><span>Entertainment News</span></a>
    <a id="nav-long-25" href="/science"><span>Science and Technology News</span></a>
  </nav>

  <!-- 測試目標 B: <li> 內的 <a>,走 walker 偵測路徑（透過 <li> block 進入） -->
  <!-- 這些應被偵測（文字夠長的那些） -->
  <nav id="trending-nav">
    <ul>
      <li id="trending-item"><a href="/article/1">Trending article title that is long enough to be detected by the paragraph collector</a></li>
    </ul>
  </nav>
</body>
</html>
