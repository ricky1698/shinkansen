<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>bbWrapper inline-link Case C fixture</title></head>
<body>
<!-- 模擬 XenForo bbWrapper 純行內段落（v1.4.19 Case C regression fixture）

  Case C：container 有直接文字 + inline 元素（<a>/<b>/<i>…），
  無 block 子孫、無 BR。
    <div class="bbWrapper">There is actually <a>some evidence</a> to support...</div>

  為什麼 Case A 和 Case B 都漏：
    - Case A 要求 containsBlockDescendant = true（此處 false）
    - Case B 要求至少一個直接 <br>（此處無）
    → 兩條路都略過，整段 TEXT + inline 子孫都不會進 walker 的結果。

  Case C 修法：4 個條件全成立才匹配，與 Case B 對稱
    (1) tag in CONTAINER_TAGS（DIV/SECTION/ARTICLE/MAIN/ASIDE）
    (2) 有直接 TEXT 子節點（hasDirectText）
    (3) directTextLength(el) >= 20 字（排除 nav 短連結／麵包屑：nav 的文字藏在 <a> 內部，
        直接文字長度通常 < 20）
    (4) isCandidateText 通過（>= 2 字、非繁中、含字母）

  觸發 extractInlineFragments，把「direct text + inline run」抽成一個 fragment unit。
-->

<!-- Case C: bbWrapper 含直接文字 + inline <a>，無 block/BR -->
<div class="message-body" id="target-c">
  <div class="bbWrapper">There is actually <a href="https://example.com/evidence">some evidence</a> to support the position that this stuff does take place.</div>
</div>

<!-- 負向對照：nav 短連結（directTextLength 幾乎為 0，都在 <a> 內）
     用來驗證 Case C 的 directTextLength >= 20 門檻確實攔住這類 -->
<nav id="target-short-nav">
  <div class="nav-item"><a href="/foo">Foo</a></div>
</nav>

</body>
</html>
