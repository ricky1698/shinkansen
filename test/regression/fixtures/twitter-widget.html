<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: twitter-interactive-widget-skip</title>
</head>
<body>
  <!--
    對應 v0.39 修的「Who-to-follow UserCell」互動 widget 容器跳過。

    結構特徵 (這才是要鎖死的通則,不是 X/Twitter 站):
      一個 block 容器內含 button 或 role="button",且 innerText 短於 300 字。
      這類「卡片式互動 widget」(Follow / Subscribe / Add 等) 的內容結構通常
      是片段化的標籤,送進 LLM 翻譯會把整張卡的版面壓扁,得不償失。
      walker 應該整塊跳過 (FILTER_REJECT) + 計入 skipStats.interactiveWidget。

      v0.39 之前的 bug:UserCell 整張被當段落送 LLM,翻完內部 inline 結構
      被壓扁,Follow 按鈕跑版。

    斷言:
      - skipStats.interactiveWidget >= 1
      - widget 容器與其內部 block 都不出現在 units 裡 (不該被翻)
      - 同頁正常段落 (control article) 仍會被收 (證明只跳 widget,不跳全頁)
  -->
  <article>
    <p id="control">This is a normal article paragraph that should still be detected and translated as usual when the page also contains an interactive widget elsewhere.</p>
  </article>
  <ul>
    <li id="widget">
      <div>
        <span>Jane Doe</span>
        <span>@janedoe</span>
      </div>
      <div>
        <span>Software engineer.</span>
      </div>
      <button type="button">Follow</button>
    </li>
  </ul>
</body>
</html>
