<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: gmail-button-nested-a</title>
</head>
<body>
  <!--
    Sanitized 重現 Gmail Claude Code welcome email「Learn more」按鈕的
    MJML / Mailjet 結構,觸發 v0.55–v0.58 連續修過的 inject bug:

    結構特徵 (重要,不要動):
      - 外層 <td> font-size:0 (MJML / Mailjet 的 inline-block-gap 消除技巧)
      - 內層 <a> 帶完整 inline style (display:inline-block + width + padding,
        在 PRESERVE_INLINE_TAGS 名單裡 → serializer 會把它包成 slot 0)
      - 最內層 <span> 沒有 class、沒有 style → 不是 preservable inline,
        但 font-size 從 <a> 繼承為 18px (非 0)

    這個結構在 v0.58 之前會踩到的 bug:
      resolveWriteTarget 從 td 開始 walk descendants 找「第一個 font-size 正常
      的非 slot 元素」當寫入目標。v0.56/v0.57 用 FILTER_SKIP 跳過 slot 元素本身
      但繼續往子節點走,於是走進 <a> 內部找到那個 SPAN (font-size 18px),
      把 SPAN 當寫入目標。injectIntoTarget 接著對 SPAN 做 clean slate +
      append fragment (內含從 slot 0 重建的另一個 <a> shell),結果就是
      <td><a outer><span><a inner>譯文</a></span></a></td> 雙層 <a> 巢狀,
      padding / width 雙層套用,按鈕視覺上凸出 35px。

    v0.58 的修法是把 walker 改成 FILTER_REJECT —— 整個 slot subtree 都不能
    當寫入目標,強迫 fall through 回 td 自己,然後 clean slate td 並 append
    fragment 的單一 <a>。

    這個 fixture 的工作就是: 餵進這個結構 + 假 LLM 回應 ⟦0⟧深入瞭解⟦/0⟧
    後注入,然後斷言「td 底下只能有一個 <a>、沒有巢狀」。
  -->
  <table cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td id="target" align="center" bgcolor="#141413"
          style="font-size:0;line-height:0;border-radius:10px;padding:0">
        <a href="https://example.com/learn-more" target="_blank"
           style="display:inline-block;width:95px;background:#141413;color:#ffffff;font-family:Helvetica,Arial,sans-serif;font-size:18px;line-height:1.2;text-decoration:none;padding:8px 35px 8px 35px;border-radius:10px">
          <span>Learn more</span>
        </a>
      </td>
    </tr>
  </table>
</body>
</html>
