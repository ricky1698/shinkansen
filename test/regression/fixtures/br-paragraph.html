<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: wiki-br-as-paragraph</title>
</head>
<body>
  <!--
    對應 v0.50 修的「<br><br> 當段落分隔符」bug,常見於 MJML / Mailjet /
    Mailchimp 等 HTML email 模板 (它們的範本沒有 <p>,多段內容用 <br><br>
    在同一個 wrapper 裡分隔)。

    結構特徵:
      <div>段落 1<br><br>段落 2<br><br>段落 3</div>
    沒有任何 preservable inline 元素 → 序列化後 slots = []。

    v0.49 之前的 bug:
      serializeNodeIterable 用 `out.replace(/\s+/g, ' ')` 把所有空白
      (含 BR 留下的隱含換行) 收成單一 space → LLM 收到一行文字
      「段落 1 段落 2 段落 3」→ 譯文也是一行 → 注入時三段譯文擠在一起。

    v0.50 / v0.51 的修法 (兩階段 normalization):
      1. 序列化時 BR 寫成 sentinel \u0001 (與 source HTML 的原生空白分開)
      2. normalize: \s+ → space,接著 \u0001+ → \u0001 (吃掉兩側空白),
         3+ 個以上 \u0001 收斂成 2 個,最後 \u0001 → \n
      3. 反序列化 (replaceTextInPlace 走 buildFragmentFromTextWithBr 分支):
         若譯文含 \n,就用 fragment + <br> 還原 → 重建三段結構

    這個 fixture 的工作:餵進 div + 三段譯文 (用 \n\n 分隔),斷言:
      a. 序列化後的 text 含 \n (確認 sentinel 流程沒被破壞)
      b. 注入後 div 內仍有 <br> 元素 (確認 \n 反向還原成功)
      c. 三段譯文順序正確、文字正確
  -->
  <div id="target" style="font-family:Helvetica,Arial,sans-serif;font-size:16px;line-height:1.5;color:#222;padding:16px">
    Welcome to Claude Code.<br><br>This email walks you through the basic setup steps.<br><br>Once you finish, you can start using Claude in your terminal.
  </div>
</body>
</html>
