<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>heading-with-button regression fixture</title></head>
<body>
  <article>
    <!-- 情境 1: H4 內含 anchor link 按鈕（Substack 結構）→ 應該被偵測 -->
    <h4 id="heading-with-btn" class="header-anchor-post">
      Imagineering and the psychology of park design
      <div style="display:contents">
        <div style="display:contents">
          <button aria-label="Link" style="display:flex"></button>
        </div>
      </div>
    </h4>

    <!-- 情境 2: 正常 H3 無按鈕 → 應該被偵測 -->
    <h3 id="normal-heading">The beginning of Disneyland and its extraordinary growth into a global empire</h3>

    <!-- 情境 3: LI 含按鈕（真正的 widget 卡片）→ 不應被偵測 -->
    <ul>
      <li id="widget-card">
        <button>Follow</button>
        <span>John Doe</span>
      </li>
    </ul>

    <p id="article-text">Walt Disney opened Disneyland in Anaheim, California on July 17, 1955. The park represented a completely new form of entertainment.</p>
  </article>
</body>
</html>
