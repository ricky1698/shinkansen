<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>contenteditable-exclude regression fixture</title></head>
<body>
  <!-- 情境 1: contenteditable 輸入框內的 placeholder → 不應被偵測 -->
  <div role="textbox" contenteditable="true">
    <div>
      <p id="ce-placeholder"><span><span contenteditable="false">What are your thoughts?</span></span></p>
    </div>
  </div>

  <!-- 情境 2: role=textbox 沒有 contenteditable（備用判斷）→ 不應被偵測 -->
  <div role="textbox">
    <p id="textbox-placeholder">Write a comment about this article and share your perspective with other readers.</p>
  </div>

  <!-- 情境 3: 正常文章段落 → 應該被偵測 -->
  <article>
    <p id="article-text">The problem lies with the idea that the art industry is filled with artistically driven people who want to support great art, and support artists.</p>
  </article>
</body>
</html>
