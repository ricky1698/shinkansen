name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Zip shinkansen folder
        run: |
          zip -r shinkansen-${{ steps.version.outputs.VERSION }}.zip shinkansen/
          cp shinkansen-${{ steps.version.outputs.VERSION }}.zip shinkansen.zip
          # Firefox beta 目前沿用同一份 MV3 產物；背景程序維持標準
          # background.service_worker，避免帶入 Chrome 會拒絕的 background.scripts。
          cp shinkansen-${{ steps.version.outputs.VERSION }}.zip shinkansen-firefox-${{ steps.version.outputs.VERSION }}-beta.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            shinkansen-${{ steps.version.outputs.VERSION }}.zip
            shinkansen.zip
            shinkansen-firefox-${{ steps.version.outputs.VERSION }}-beta.zip
          generate_release_notes: true
          # GitHub 預設「建立時間最新 = Latest」會被補建舊 tag 偷走 Latest 標籤。
          # legacy 改用 semver：highest version 才是 Latest，與補建順序無關。
          make_latest: "legacy"
